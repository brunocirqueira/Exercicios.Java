<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tabelas</title>
</head>
<body>
     <h1>Tabelas</h1>

     <table border="1">
        <tr>
            <th>produto</th>     
            <th>quantidade</th>     
            <th>preco</th>     
            
        </tr>
        <tr>
            <td>Dipirona</td>
            <td>12</td>
            <td>9,99</td>
        </tr>
        <tr>
            <td>Dorflex</td>
            <td>55</td>
            <td>11,98</td>
        </tr>

        <tr>
            <td rowspan="2">desconto</td>
            <td colspan="2">cupom 1 - R$ 20</td>
        </tr>
        <tr>
            <td colspan="2">cupom 2 - R$20</td>
        </tr>
     </table>
</body>
</html>
