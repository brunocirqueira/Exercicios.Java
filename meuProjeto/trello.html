<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interface de login do Trello</title>

    <script src="https://unpkg.com/@codans/trello"></script>
    
</head>
<body>

  <img src="IMG/trello.svg" alt="imagem trello" width="200">

  <h1>Fazer Login no Trello</h1>
  
  <form action="" method="GET">
        
     <input type="text" name="email" placeholder="Insira o email"><br>
     <input type="password" name="senha" placeholder="Insira a senha"><br>
     <input type="submit" value="fazer login"><br><br>
     
     <span>ou</span><br><br>

    <button>
      <img src="IMG/google.svg" alt="google" width="25"> 
      Continuar com o google
    </button><br><br>

    <button>
      <img src="IMG/microsoft.svg" alt="microsoft" width="25"> 
      Continuar com a microsoft
    </button><br><br>

    <button>
      <img src="IMG/apple.svg" alt="apple" width="25">
      Continuar com a apple
    </button><br><br>
 
   <button>
      <img src="IMG/slack.svg" alt="slack" width="25">
      Continuar com o slack
   </button><br><br>

</form>


<img src="IMG/atlassian.svg" alt="atlassian" width="200">
<img src="IMG/interactive.svg" alt="interactive" width="200">
<img src="IMG/analytics.svg" alt="analytics" width="200">
   
</body>
</html>
